[build]
  publish = "."

[[redirects]]
  from   = "https://www.corradogizzi.it/*"
  to     = "https://corradogizzi.it/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"